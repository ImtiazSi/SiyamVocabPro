<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Siyam VocabPro • Complete</title>
<style>
:root {
  --bg: #1a1e2b;
  --card-bg: rgba(22,26,35,0.85);
  --gold: #f9d56e;
  --text: #f0f0f0;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Segoe UI','Poppins',system-ui,sans-serif;
  background:linear-gradient(145deg,#1a1e2b 0%,#2a3142 100%);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
  margin:0;
}
.app-container{
  max-width:520px;
  width:100%;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-radius:36px;
  box-shadow:0 30px 50px rgba(0,0,0,0.5),inset 0 1px 1px rgba(255,255,255,0.1);
  padding:20px 18px 25px;
  border:1px solid rgba(255,255,255,0.12);
  display:flex;
  flex-direction:column;
  gap:16px;
  max-height:95vh;
  overflow-y:auto;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
  flex-wrap:wrap;
  gap:8px;
}
.logo{
  font-weight:700;
  font-size:1.5rem;
  background:linear-gradient(135deg,#f9d56e,#f8b042);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.menu-btns{
  display:flex;
  gap:8px;
}
.menu-btn{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:8px 14px;
  border-radius:20px;
  font-weight:600;
  font-size:0.8rem;
  cursor:pointer;
  transition:0.2s;
}
.menu-btn.active{
  background:#f9d56e;
  color:#1a1e2b;
  border-color:#f9d56e;
}
.word-card{
  background:var(--card-bg);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:32px;
  padding:24px 20px;
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 20px 30px -10px black;
  transition:all 0.3s;
}
.word-main{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:10px;
}
.word-text{
  font-size:2.6rem;
  font-weight:700;
  color:white;
  text-shadow:0 4px 10px rgba(0,0,0,0.4);
  line-height:1.1;
}
.pos-badge{
  background:rgba(255,255,255,0.12);
  padding:6px 16px;
  border-radius:25px;
  font-weight:600;
  font-size:0.85rem;
  text-transform:uppercase;
  color:#f0e6c5;
  border:1px solid rgba(255,255,255,0.2);
}
.bengali-meaning{
  font-size:1.3rem;
  font-weight:600;
  color:#ffd966;
  margin:8px 0 12px;
  background:rgba(0,0,0,0.3);
  padding:8px 16px;
  border-radius:20px;
  display:inline-block;
}
.syn-ant-row{
  display:flex;
  gap:12px;
  margin:8px 0 14px;
  flex-wrap:wrap;
}
.syn-box,.ant-box{
  flex:1;
  min-width:120px;
  background:rgba(255,255,255,0.05);
  padding:10px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
}
.syn-label,.ant-label{
  font-size:0.7rem;
  text-transform:uppercase;
  font-weight:700;
  letter-spacing:0.8px;
}
.syn-label{color:#6ab04c}
.ant-label{color:#eb4d4b}
.syn-text,.ant-text{
  color:#ddd;
  font-size:0.95rem;
  font-weight:500;
}
.examples{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin:12px 0 5px;
}
.example-item{
  display:flex;
  flex-direction:column;
  gap:4px;
  border-left:4px solid;
  padding:8px 12px;
  border-radius:0 12px 12px 0;
  background:rgba(255,255,255,0.04);
}
.example-level{
  font-size:0.65rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
}
.eng-sentence{font-weight:500;color:#f0f0f0;font-size:0.95rem}
.ben-sentence{color:#b9c6da;font-size:0.85rem;font-style:italic}
.action-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:14px 0 5px;
  flex-wrap:wrap;
  gap:8px;
}
.favorite-btn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:10px 16px;
  border-radius:25px;
  font-size:1rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
}
.favorite-btn.active{background:#e03a4c;border-color:#ff8a8a}
.pronounce-btn{
  background:#f9d56e;
  border:none;
  border-radius:25px;
  padding:10px 16px;
  font-weight:600;
  color:#1a1e2b;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
}
.nav-buttons{
  display:flex;
  justify-content:space-between;
  gap:8px;
}
.nav-btn{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:12px 14px;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
  flex:1;
  font-size:0.85rem;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.quiz-btn{background:#4b5c7a;border-color:#6d7f9c}
.exam-btn{background:#c44569;border-color:#e06080}
.notification-banner{
  background:rgba(249,213,110,0.12);
  border-radius:18px;
  padding:10px 14px;
  color:#ffe5a3;
  display:none;
  align-items:center;
  justify-content:space-between;
  font-size:0.8rem;
  border:1px solid rgba(249,213,110,0.3);
}
.creator-info{
  text-align:center;
  color:rgba(255,255,255,0.5);
  font-size:0.7rem;
  padding:5px 0;
}
.creator-info a{color:#f9d56e;text-decoration:none}
/* Modal Styles */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
  align-items:center;
  justify-content:center;
  z-index:1000;
}
.modal-content{
  background:#202433;
  border-radius:28px;
  padding:22px;
  max-width:400px;
  width:92%;
  color:white;
  border:1px solid rgba(255,255,255,0.15);
  max-height:85vh;
  overflow-y:auto;
}
.modal h3{color:#f9d56e;margin-bottom:14px}
.option-btn{
  padding:12px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.25);
  background:rgba(255,255,255,0.08);
  color:white;
  font-weight:600;
  cursor:pointer;
  width:100%;
  text-align:left;
  transition:0.2s;
}
.option-btn:hover{background:rgba(255,255,255,0.15)}
.option-btn.correct{background:#27ae60!important;border-color:#2ecc71!important}
.option-btn.wrong{background:#e74c3c!important;border-color:#c0392b!important}
.timer-display{
  font-size:2rem;
  font-weight:700;
  text-align:center;
  color:#f9d56e;
  margin:10px 0;
}
.stat-row{
  display:flex;
  justify-content:space-between;
  color:#ccc;
  font-size:0.9rem;
  margin:5px 0;
}
.close-btn{
  background:#4b5c7a;
  padding:10px;
  border-radius:20px;
  color:white;
  width:100%;
  border:none;
  cursor:pointer;
  margin-top:10px;
  font-weight:600;
}
select{
  background:#2a3142;
  color:white;
  border:1px solid rgba(255,255,255,0.2);
  padding:10px;
  border-radius:12px;
  width:100%;
  margin:8px 0;
  font-size:0.9rem;
}
.start-btn{
  background:#27ae60;
  color:white;
  border:none;
  padding:12px;
  border-radius:20px;
  font-weight:700;
  width:100%;
  cursor:pointer;
  margin-top:8px;
  font-size:1rem;
}
@media(max-width:400px){
  .word-text{font-size:2rem}
  .menu-btn{font-size:0.7rem;padding:6px 10px}
}
</style>
</head>
<body>
<div class="app-container" id="appRoot">

<div class="header">

<div class="creator-info">
Created by <strong>Imtiaz Ahmed Siyam</strong> •

<!-- QUIZ MODAL -->

<!-- EXAM MODAL -->

<option value="10">10</option>

<!-- GAME MODAL -->
<div id="gameModal" class="modal">
<div class="modal-content" style="text-align:center">

<p style="margin:10px 0">Bengali meaning দেখে দ্রুত ইংরেজি শব্দ টাইপ করুন!</p>
<div id="gameWord" style="font-size:1.8rem;color:#f9d56e;margin:15px 0"></div>
<input id="gameInput" type="text" placeholder="ইংরেজি শব্দ লিখুন..." style="width:100%;padding:12px;border-radius:15px;border:1px solid rgba(255,255,255,0.3);background:#2a3142;color:white;font-size:1rem;text-align:center">
<div class="stat-row" style="margin:10px 0"><span>Score:</span><span id="gameScore">0</span></div>

</div>
</div>

<script>
(function(){
// ============ WORD DATABASE WITH SYNONYMS & ANTONYMS ============
const rawWords=[
{
  word:"Ephemeral",bengali:"ক্ষণস্থায়ী",pos:"adjective",
  synonym:"Transient, Fleeting",antonym:"Permanent, Eternal",
  examples:[
    {level:"easy",eng:"The sunset was ephemeral but beautiful.",ben:"সূর্যাস্তটি ক্ষণস্থায়ী কিন্তু সুন্দর ছিল।"},
    {level:"medium",eng:"Fame can be ephemeral in the digital age.",ben:"ডিজিটাল যুগে খ্যাতি ক্ষণস্থায়ী হতে পারে।"},
    {level:"advanced",eng:"He contemplated the ephemeral nature of human existence.",ben:"তিনি মানব অস্তিত্বের ক্ষণস্থায়ী প্রকৃতি নিয়ে চিন্তা করলেন।"}
  ]
},
{
  word:"Ubiquitous",bengali:"সর্বব্যাপী",pos:"adjective",
  synonym:"Omnipresent, Pervasive",antonym:"Rare, Scarce",
  examples:[
    {level:"easy",eng:"Smartphones are ubiquitous nowadays.",ben:"স্মার্টফোন আজকাল সর্বব্যাপী।"},
    {level:"medium",eng:"The ubiquitous presence of social media shapes opinions.",ben:"সামাজিক মাধ্যমের সর্বব্যাপী উপস্থিতি মতামত গঠন করে।"},
    {level:"advanced",eng:"Her influence became ubiquitous across industries.",ben:"তার প্রভাব শিল্পক্ষেত্রে সর্বব্যাপী হয়ে উঠল।"}
  ]
},
{
  word:"Eloquent",bengali:"বাকপটু",pos:"adjective",
  synonym:"Articulate, Fluent",antonym:"Inarticulate, Mute",
  examples:[
    {level:"easy",eng:"She gave an eloquent speech.",ben:"তিনি একটি বাকপটু বক্তৃতা দিলেন।"},
    {level:"medium",eng:"His eloquent gestures conveyed deep emotion.",ben:"তার বাকপটু অঙ্গভঙ্গি গভীর আবেগ প্রকাশ করল।"},
    {level:"advanced",eng:"The lawyer's eloquent argument swayed the jury.",ben:"উকিলের বাকপটু যুক্তি জুরিকে প্রভাবিত করল।"}
  ]
},
{
  word:"Resilient",bengali:"স্থিতিস্থাপক",pos:"adjective",
  synonym:"Tough, Adaptable",antonym:"Fragile, Vulnerable",
  examples:[
    {level:"easy",eng:"Children are often resilient.",ben:"শিশুরা প্রায়ই স্থিতিস্থাপক হয়।"},
    {level:"medium",eng:"The resilient economy recovered quickly.",ben:"স্থিতিস্থাপক অর্থনীতি দ্রুত পুনরুদ্ধার হলো।"},
    {level:"advanced",eng:"She remained resilient despite repeated failures.",ben:"বারবার ব্যর্থতা সত্ত্বেও তিনি স্থিতিস্থাপক ছিলেন।"}
  ]
},
{
  word:"Meticulous",bengali:"খুঁটিনাটি",pos:"adjective",
  synonym:"Thorough, Precise",antonym:"Careless, Sloppy",
  examples:[
    {level:"easy",eng:"He is meticulous about his work.",ben:"সে তার কাজে খুঁটিনাটি।"},
    {level:"medium",eng:"Meticulous planning ensured the event's success.",ben:"খুঁটিনাটি পরিকল্পনা অনুষ্ঠানের সাফল্য নিশ্চিত করেছিল।"},
    {level:"advanced",eng:"The meticulous restoration took five years.",ben:"খুঁটিনাটি পুনরুদ্ধারে পাঁচ বছর লেগেছিল।"}
  ]
},
{
  word:"Candid",bengali:"অকপট",pos:"adjective",
  synonym:"Frank, Honest",antonym:"Deceptive, Evasive",
  examples:[
    {level:"easy",eng:"She gave a candid interview.",ben:"তিনি একটি অকপট সাক্ষাৎকার দিলেন।"},
    {level:"medium",eng:"His candid feedback improved the project.",ben:"তার অকপট মতামত প্রকল্পটি উন্নত করল।"},
    {level:"advanced",eng:"A candid conversation resolved their differences.",ben:"একটি অকপট কথোপকথন তাদের মতভেদ দূর করল।"}
  ]
},
{
  word:"Benevolent",bengali:"দয়ালু",pos:"adjective",
  synonym:"Kind, Generous",antonym:"Cruel, Malevolent",
  examples:[
    {level:"easy",eng:"She has a benevolent smile.",ben:"তার একটি দয়ালু হাসি আছে।"},
    {level:"medium",eng:"The benevolent donor funded the hospital.",ben:"দয়ালু দাতা হাসপাতালে অর্থায়ন করলেন।"},
    {level:"advanced",eng:"His benevolent leadership transformed the community.",ben:"তার দয়ালু নেতৃত্ব সমাজকে বদলে দিল।"}
  ]
},
{
  word:"Pragmatic",bengali:"বাস্তববাদী",pos:"adjective",
  synonym:"Practical, Realistic",antonym:"Idealistic, Impractical",
  examples:[
    {level:"easy",eng:"We need a pragmatic solution.",ben:"আমাদের একটি বাস্তববাদী সমাধান প্রয়োজন।"},
    {level:"medium",eng:"Her pragmatic approach saved the company.",ben:"তার বাস্তববাদী দৃষ্টিভঙ্গি কোম্পানি বাঁচিয়েছে।"},
    {level:"advanced",eng:"The politician advocated for pragmatic reforms.",ben:"রাজনীতিবিদ বাস্তববাদী সংস্কারের পক্ষে কথা বললেন।"}
  ]
}
];

// Build 5000 word bank
const wordBank=[];
for(let i=0;i<5000;i++){
let b=rawWords[i%rawWords.length];
wordBank.push({
id:i,word:b.word,bengali:b.bengali,pos:b.pos,
synonym:b.synonym,antonym:b.antonym,
examples:b.examples.map(e=>({level:e.level,eng:e.eng,ben:e.ben}))
});
}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}
shuffle(wordBank);

// ============ STATE ============
let idx=0,favs=new Set(),seen=new Set(),mode='learn';
let quizState={active:false,score:0,qNum:0,total:10,correctWord:null,answered:false};

// ============ LEARN MODE RENDER ============
function renderWord(){
if(mode!=='learn')return;
let w=wordBank[idx];
if(!w)return;
card.style.background=themes[idx%themes.length];
card.style.boxShadow='0 20px 30px -5px rgba(0,0,0,0.6)';
let f=favs.has(w.id);
card.innerHTML=`
<div class="word-main">
<span class="word-text">${w.word}</span>
<span class="pos-badge">${w.pos}</span>
</div>
<div class="bengali-meaning">🇧🇩 ${w.bengali}</div>
<div class="syn-ant-row">
<div class="syn-box"><span class="syn-label">Synonym</span><br><span class="syn-text">${w.synonym}</span></div>
<div class="ant-box"><span class="ant-label">Antonym</span><br><span class="ant-text">${w.antonym}</span></div>
</div>
<div class="examples" id="exCont"></div>
<div class="action-row">
<button id="favBtn" class="favorite-btn${f?' active':''}">${f?'❤️':'🤍'} প্রিয়</button>
<button id="pronBtn" class="pronounce-btn">🔊 উচ্চারণ</button>
</div>`;
let ec=document.getElementById('exCont');
let lc={easy:'#6ab04c',medium:'#f9ca24',advanced:'#eb4d4b'};
w.examples.forEach(ex=>{
let d=document.createElement('div');d.className='example-item';
d.style.borderLeftColor=lc[ex.level]||'#ccc';
d.innerHTML=`<span class="example-level" style="color:${lc[ex.level]}">${ex.level}</span><span class="eng-sentence">${ex.eng}</span><span class="ben-sentence">${ex.ben}</span>`;
ec.appendChild(d);
});
document.getElementById('favBtn').addEventListener('click',()=>{if(favs.has(w.id))favs.delete(w.id);else favs.add(w.id);renderWord()});
document.getElementById('pronBtn').addEventListener('click',()=>{speakWord(w.word)});
seen.add(idx);
updateProgress();
}

function speakWord(word){
if('speechSynthesis' in window){
let u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.9;
speechSynthesis.cancel();speechSynthesis.speak(u);
}
}

function updateProgress(){
let p=Math.min(100,Math.round((seen.size/wordBank.length)*100));
let pe=document.getElementById('progressText');
if(pe){pe.textContent=seen.size+'/'+wordBank.length;}
let pf=document.getElementById('progressFill');
if(pf){pf.style.width=p+'%';}
}

function goPrev(){if(wordBank.length){idx=(idx-1+wordBank.length)%wordBank.length;renderWord();}}
function goNext(){if(wordBank.length){idx=(idx+1)%wordBank.length;renderWord();}}
